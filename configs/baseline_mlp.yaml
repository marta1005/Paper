seed: 42
output_dir: outputs/baseline_mlp
data:
  data_dir: data
  case_index_dir: processed/case_indices
  val_fraction: 0.0
  seed: 42
  max_train_points:
  max_val_points:
features:
  input_columns: [0, 1, 3, 4, 5, 6, 7, 8]
graph:
  build_if_missing: false
shock_score:
  train_path: processed/shock_scores/train_shock_scores.npz
scaling:
  enabled: false
  scaler_dir: processed/scalers/baseline_mlp
model:
  name: baseline_mlp
  kwargs:
    input_dim: 8
    hidden_dim: 128
    depth: 4
    dropout: 0.0
training:
  epochs: 20
  batch_size: 65536
  lr: 0.001
  weight_decay: 0.000001
  num_workers: 4
  shuffle: false
  log_every_batches: 100
loss:
  global: 1.0
  mae: 0.0
  weighted: 0.0
  shock: 0.0
  residual: 0.0
