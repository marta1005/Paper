data_dir: data
train_shock_score_path: processed/shock_scores/train_shock_scores.npz
sensor_dataset_dir: processed/symbolic_sensor
train_sensor_path: processed/symbolic_sensor/train_sensor.parquet
val_sensor_path: processed/symbolic_sensor/val_sensor.parquet
sensor_output_dir: outputs/symbolic_sensor
best_sensor_path: outputs/symbolic_sensor/best_sensor.json
export_dir: outputs/symbolic_sensor/export
max_samples: 10000
shock_threshold: 0.5
shock_fraction: 0.5
val_fraction: 0.2
seed: 42
backend: gplearn
gplearn:
  population_size: 1000
  generations: 20
  tournament_size: 20
  init_depth: [2, 5]
  function_set: [add, sub, mul, div, sqrt, log, abs, neg, inv, max, min, sin, cos]
  metric: mean absolute error
  parsimony_coefficient: 0.001
  max_samples: 0.9
  n_jobs: 1
  verbose: 1
  random_state: 42
pysr:
  niterations: 40
  populations: 16
  maxsize: 30
