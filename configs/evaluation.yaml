seed: 42
output_dir: outputs/evaluation
checkpoint: outputs/symbolic_gated_residual/checkpoints/best.pt
data:
  data_dir: data
  max_eval_points:
features:
  input_columns: [0, 1, 3, 4, 5, 6, 7, 8]
graph:
  test_graph_path: processed/graphs/test_knn_graph_xy.npz
  k_neighbors: 16
  projection: xy
  build_if_missing: true
shock_score:
  test_path: processed/shock_scores/test_shock_scores.npz
symbolic_sensor:
  path: outputs/symbolic_sensor/best_sensor.json
  dummy_value: 0.0
scaling:
  enabled: false
  scaler_dir: processed/scalers/symbolic_gated_residual
model:
  name: symbolic_gated_residual
  kwargs:
    input_dim: 8
    fourier_num_frequencies: 6
    fourier_variables_to_encode: [0, 1, 5, 6, 7]
    fourier_direct_variables: [2, 3, 4]
    graph_hidden_dim: 128
    graph_out_dim: 128
    graph_rel_dim: 2
    hidden_dim: 128
    depth: 3
evaluation:
  batch_size: 1024
  shock_threshold: 0.5
plots:
  views: [xy, xz]
  baseline_predictions_npz:
