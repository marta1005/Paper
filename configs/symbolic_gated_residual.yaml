seed: 42
output_dir: outputs/symbolic_gated_residual
data:
  data_dir: data
  val_fraction: 0.0
  seed: 42
  max_train_points:
  max_val_points:
features:
  input_columns: [0, 1, 3, 4, 5, 6, 7, 8]
graph:
  train_graph_path:
  k_neighbors: 16
  projection: xy
  build_if_missing: false
shock_score:
  train_path: processed/shock_scores/train_shock_scores.npz
symbolic_sensor:
  path: outputs/symbolic_sensor/best_sensor.json
  dummy_value: 0.0
scaling:
  enabled: false
  scaler_dir: processed/scalers/symbolic_gated_residual
model:
  name: symbolic_gated_residual
  kwargs:
    input_dim: 8
    fourier_num_frequencies: 4
    fourier_variables_to_encode: [0, 1, 5, 6, 7]
    fourier_direct_variables: [2, 3, 4]
    graph_hidden_dim: 128
    graph_out_dim: 128
    graph_rel_dim: 2
    hidden_dim: 128
    depth: 3
training:
  epochs: 30
  batch_size: 16384
  lr: 0.001
  weight_decay: 0.000001
  num_workers: 4
  shuffle: false
  log_every_batches: 25
loss:
  global: 1.0
  mae: 0.0
  weighted: 1.0
  sensor_weight: 5.0
  shock: 0.0
  residual: 0.01
