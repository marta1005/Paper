seed: 42
data_dir: data
case_index_dir: outputs/symbolic/case_index
output_dir: outputs/symbolic/features
splits: [train, test]
logging:
  level: INFO
case_filters:
  min_mach: 0.7
features:
  # Production default: process all transonic cases in 2D projected grids.
  mode: grid2d
  clean_output: true
  max_cases:
  max_points_per_case:
  projection:
    surface: upper
    normal_z_threshold: 0.0
    x_bins: 384
    y_bins: 192
  # Used only for mode: pointwise/knn.
  k_neighbors: 16
  batch_size: 4096
  max_numpy_knn_points: 5000
