seed: 42
data_dir: data
case_index_dir: outputs/symbolic/case_index
output_dir: outputs/symbolic/features
splits: [train, test]
logging:
  level: INFO
case_filters:
  min_mach: 0.7
features:
  # For a first smoke run, keep this small. Set null for all indexed cases.
  max_cases: 2
  # kNN features are computed after optional per-case sampling.
  max_points_per_case: 3000
  k_neighbors: 16
  batch_size: 4096
  max_numpy_knn_points: 5000
