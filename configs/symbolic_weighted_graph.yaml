seed: 42
output_dir: outputs/symbolic_weighted_graph
data:
  data_dir: data
  val_fraction: 0.2
  seed: 42
  max_train_points: 2000000
  max_val_points: 400000
features:
  input_columns: [0, 1, 3, 4, 5, 6, 7, 8]
graph:
  train_graph_path: processed/graphs/train_knn_graph_xy.npz
  k_neighbors: 16
  projection: xy
  build_if_missing: true
shock_score:
  train_path: processed/shock_scores/train_shock_scores.npz
symbolic_sensor:
  chi_train_path:
scaling:
  enabled: false
  scaler_dir: processed/scalers/symbolic_weighted_graph
model:
  name: symbolic_weighted_graph
  kwargs:
    input_dim: 8
    fourier_num_frequencies: 6
    fourier_variables_to_encode: [0, 1, 5, 6, 7]
    fourier_direct_variables: [2, 3, 4]
    graph_hidden_dim: 128
    graph_out_dim: 128
    graph_rel_dim: 2
    hidden_dim: 128
    depth: 3
training:
  epochs: 60
  batch_size: 8192
  lr: 0.001
  weight_decay: 0.000001
  num_workers: 4
  log_every_batches: 25
loss:
  global: 1.0
  mae: 0.0
  weighted: 1.0
  sensor_weight: 5.0
  shock: 0.0
  residual: 0.0
