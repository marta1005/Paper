seed: 42
output_dir: outputs/oracle_gated_residual
data:
  data_dir: data
  val_fraction: 0.2
  seed: 42
  max_train_points: 2000000
  max_val_points: 400000
graph:
  train_graph_path: processed/graphs/train_knn_graph_xy.npz
  k_neighbors: 16
  projection: xy
  build_if_missing: true
shock_score:
  train_path: processed/shock_scores/train_shock_scores.npz
scaling:
  enabled: false
  scaler_dir: processed/scalers/oracle_gated_residual
model:
  name: oracle_gated_residual
  kwargs:
    input_dim: 9
    fourier_num_frequencies: 6
    graph_hidden_dim: 128
    graph_out_dim: 128
    hidden_dim: 128
    depth: 3
training:
  epochs: 60
  batch_size: 4096
  lr: 0.001
  weight_decay: 0.000001
  num_workers: 4
  log_every_batches: 25
loss:
  global: 1.0
  mae: 0.0
  weighted: 1.0
  sensor_weight: 5.0
  shock: 1.0
  residual: 0.01
