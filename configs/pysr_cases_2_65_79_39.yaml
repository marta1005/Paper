seed: 42
table_path: outputs/symbolic/tables/shock_symbolic_train.csv
features_dir: outputs/symbolic/features_cases_2_65_79_39
labels_dir: outputs/symbolic/labels_cases_2_65_79_39
output_dir: outputs/symbolic/pysr
sensor_path: outputs/symbolic/pysr/best_sensor.json
export_dir: outputs/symbolic/export
target_name: shock_score
threshold_metric: f1
logging:
  level: INFO
feature_names:
  - Cp
  - Cf_mag
  - Cf_parallel
  - Cf_perp
  - grad_Cp_mag
  - grad_Cp_streamwise
  - local_Cp_contrast
  - grad_Cf_mag
  - local_Cf_contrast
  - x
  - y
  - z
  - nx
  - ny
  - nz
  - Mach
  - AoA
  - pi_scaled
pysr:
  niterations: 200
  populations: 16
  binary_operators: ["+", "-", "*", "/"]
  unary_operators: ["sqrt", "log", "abs"]
  model_selection: best
  maxsize: 32
  progress: true
evaluation:
  split: test
  clean_output: true
  output_dir: outputs/symbolic/evaluation_cases_2_65_79_39
  case_ids:
    - test_0002
    - test_0065
    - test_0079
    - test_0039
  plot_max_cases: 4
  plot_max_points: 100000
